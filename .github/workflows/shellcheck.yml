name: ShellCheck

on:
  push:
    paths: [ 'portcullis', '**/*.sh', '.github/workflows/shellcheck.yml' ]
  pull_request:
    paths: [ 'portcullis', '**/*.sh' ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: shellcheck --shell=bash --severity=warning portcullis
